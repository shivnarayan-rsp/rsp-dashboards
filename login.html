<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSP Dashboard Command Center | Sign In</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #D7063B;
    --red-glow: rgba(215, 6, 59, 0.12);
    --dark: #111111;
    --mid: #1e1e1e;
    --card: #252525;
    --border: rgba(255,255,255,0.08);
    --border-focus: rgba(215,6,59,0.5);
    --text: #f0f0f0;
    --text-dim: #777777;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    padding: 24px;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .card {
    width: 100%;
    max-width: 380px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 48px 40px 40px;
    position: relative;
    animation: fadeUp 0.4s ease both;
  }

  /* Red top accent */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--red);
    border-radius: 12px 12px 0 0;
  }

  h1 {
    font-size: 22px;
    font-weight: 300;
    color: var(--text);
    margin-bottom: 6px;
    letter-spacing: -0.3px;
  }

  h1 strong { font-weight: 600; }

  .tagline {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 36px;
    font-weight: 300;
  }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 24px;
  }

  input[type="password"] {
    width: 100%;
    background: var(--mid);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 13px 44px 13px 16px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    letter-spacing: 0.1em;
  }

  input[type="password"]:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px var(--red-glow);
  }

  input[type="password"].error {
    border-color: var(--red);
    animation: shake 0.3s ease;
  }

  /* Show/hide toggle */
  .toggle-vis {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    color: var(--text-dim);
    transition: color 0.15s;
    display: flex;
    align-items: center;
  }

  .toggle-vis:hover { color: var(--text); }

  .toggle-vis svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .error-msg {
    font-size: 12px;
    color: var(--red);
    margin-top: -18px;
    margin-bottom: 20px;
    min-height: 16px;
    font-family: 'DM Mono', monospace;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .error-msg.visible { opacity: 1; }

  button[type="submit"] {
    width: 100%;
    background: var(--red);
    color: white;
    border: none;
    border-radius: 7px;
    padding: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  button[type="submit"]:hover { background: #b8052f; }
  button[type="submit"]:active { transform: scale(0.98); }

  .footer-note {
    margin-top: 28px;
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.03em;
    line-height: 1.6;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%       { transform: translateX(-6px); }
    60%       { transform: translateX(6px); }
  }
</style>
</head>
<body>

<div class="card">
  <img src="ricoh-logo-white-on-transparent.png" alt="Ricoh" style="height:28px;display:block;">
  <h1>Dashboard<strong>Command Center</strong></h1>
  <p class="tagline">Ricoh South Pacific staff only — restricted access</p>

  <form id="loginForm" autocomplete="off">
    <label for="pwd">Access password</label>
    <div class="input-wrap">
      <input type="password" id="pwd" placeholder="Enter password" autofocus autocomplete="current-password">
      <button type="button" class="toggle-vis" id="toggleVis" tabindex="-1" aria-label="Show password">
        <!-- Eye icon -->
        <svg id="eyeIcon" viewBox="0 0 24 24">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <!-- Eye-off icon (hidden by default) -->
        <svg id="eyeOffIcon" viewBox="0 0 24 24" style="display:none">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
      </button>
    </div>
    <div class="error-msg" id="errorMsg">Incorrect password. Try again.</div>
    <button type="submit">Sign in →</button>
  </form>

  <p class="footer-note">
    RSP internal use only · Contact Shiv for access<br>
  </p>
</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────
  // SHA-256 hash of your password.
  // Generate at: https://emn178.github.io/online-tools/sha256.html
  // Replace the string below with your own hash.
  const PASSWORD_HASH = '850abe090d258c3cc63a7ea7e945c95e849108279ff0d60a0d0e8bd79a8aa29e';
  const SESSION_KEY   = 'rsp_auth';
  // ────────────────────────────────────────────────────────

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  // Toggle show/hide password
  const input     = document.getElementById('pwd');
  const toggleBtn = document.getElementById('toggleVis');
  const eyeOn     = document.getElementById('eyeIcon');
  const eyeOff    = document.getElementById('eyeOffIcon');

  toggleBtn.addEventListener('click', () => {
    const showing = input.type === 'text';
    input.type    = showing ? 'password' : 'text';
    eyeOn.style.display  = showing ? '' : 'none';
    eyeOff.style.display = showing ? 'none' : '';
  });

  // Form submit
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorMsg = document.getElementById('errorMsg');
    const hash = await sha256(input.value.trim());

    if (hash === PASSWORD_HASH) {
      sessionStorage.setItem(SESSION_KEY, hash);
      const redirect = sessionStorage.getItem('rsp_redirect') || 'index.html';
      sessionStorage.removeItem('rsp_redirect');
      window.location.replace(redirect);
    } else {
      input.classList.add('error');
      errorMsg.classList.add('visible');
      input.value = '';
      input.focus();
      setTimeout(() => input.classList.remove('error'), 400);
    }
  });

  // If already authenticated, skip login
  const existingToken = sessionStorage.getItem(SESSION_KEY);
  if (existingToken && existingToken === PASSWORD_HASH) {
    window.location.replace(sessionStorage.getItem('rsp_redirect') || 'index.html');
  }
</script>
</body>
</html>
