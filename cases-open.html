<style>
  :root {
    --red:#D7063B; --charcoal:#1a1a1a; --mid:#444; --muted:#888;
    --border:#e5e5e5; --bg:#f7f7f6; --surface:#fff; --surface2:#f2f2f1;
    --green:#1a6e2e; --green-bg:#e6f4ea;
    --amber:#8a5200; --amber-bg:#fef3dc;
    --danger:#c0392b; --danger-bg:#fdecea;
    --blue:#0057b8; --blue-bg:#e8f0fb;
    --gray:#555; --gray-bg:#efefef;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--charcoal);min-height:100vh;-webkit-font-smoothing:antialiased;}

  header{background:var(--charcoal);border-bottom:3px solid var(--red);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .header-center{display:flex;align-items:center;gap:16px;}
  .wordmark{font-size:22px;font-weight:600;color:var(--red);letter-spacing:.15em;text-transform:uppercase;}
  .hd{width:1px;height:22px;background:#444;}
  .header-title{font-size:13px;font-weight:400;color:#aaa;letter-spacing:.03em;}
  .header-right{display:flex;align-items:center;gap:16px;}
  .as-of{font-size:11px;color:#666;font-family:'DM Mono',monospace;}
  .back-link{font-size:11px;color:#666;text-decoration:none;transition:color .15s;}
  .back-link:hover{color:#aaa;}

  main{max-width:1400px;margin:0 auto;padding:28px 24px 64px;}

  /* NAV */
  .nav-pills{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
  .nav-pill{padding:7px 16px;font-size:12px;font-weight:500;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--mid);text-decoration:none;transition:all .15s;letter-spacing:.02em;}
  .nav-pill:hover{border-color:var(--red);color:var(--red);}
  .nav-pill.active{background:var(--charcoal);border-color:var(--charcoal);color:#fff;}

  /* KPI STRIP */
  .kpi-strip{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:20px;}
  .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px 16px;position:relative;overflow:hidden;cursor:pointer;transition:box-shadow .15s;}
  .kpi-card:hover{box-shadow:0 3px 12px rgba(0,0,0,.08);}
  .kpi-card.selected{border-color:var(--red);}
  .kpi-card.selected::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--red);}
  .kpi-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px;}
  .kpi-value{font-size:26px;font-weight:300;line-height:1;font-variant-numeric:tabular-nums;}
  .kpi-value.alert{color:var(--danger);}
  .kpi-sub{font-size:10px;color:var(--muted);margin-top:4px;}

  /* FILTER BAR */
  .filter-bar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
  .filter-bar select, .filter-bar input{
    height:34px;padding:0 10px;font-size:12px;font-family:'DM Sans',sans-serif;
    border:1px solid var(--border);border-radius:4px;background:var(--surface);
    color:var(--charcoal);outline:none;transition:border-color .15s;
  }
  .filter-bar select:focus,.filter-bar input:focus{border-color:var(--red);}
  .filter-bar input{width:220px;}
  .filter-bar select{cursor:pointer;}
  .clear-btn{height:34px;padding:0 14px;font-size:12px;font-family:'DM Sans',sans-serif;
    border:1px solid var(--border);border-radius:4px;background:var(--surface);
    color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;}
  .clear-btn:hover{border-color:var(--red);color:var(--red);}
  .result-count{font-size:12px;color:var(--muted);margin-left:auto;font-family:'DM Mono',monospace;white-space:nowrap;}

  /* TABLE */
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:6px;}
  .table-scroll{overflow-x:auto;border-radius:6px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead{position:static;}
  th{
    padding:10px 12px;text-align:left;font-size:10px;font-weight:600;
    text-transform:uppercase;letter-spacing:.08em;color:var(--muted);
    background:var(--surface2);border-bottom:1px solid var(--border);
    white-space:nowrap;cursor:pointer;user-select:none;
  }
  th:hover{color:var(--charcoal);}
  th.sorted-asc::after{content:' ↑';color:var(--red);}
  th.sorted-desc::after{content:' ↓';color:var(--red);}
  td{padding:9px 12px;border-bottom:1px solid #f0f0f0;vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:#fafafa;}

  /* CASE LINK */
  .case-link{
    font-family:'DM Mono',monospace;font-size:12px;font-weight:500;
    color:var(--red);text-decoration:none;
  }
  .case-link:hover{text-decoration:underline;}

  /* BADGES */
  .badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:500;white-space:nowrap;}
  .b-New{background:var(--blue-bg);color:var(--blue);}
  .b-WOI{background:var(--green-bg);color:var(--green);}
  .b-Invoice{background:var(--amber-bg);color:var(--amber);}
  .b-Waiting{background:var(--gray-bg);color:var(--gray);}
  .b-Escalated,.b-Stop{background:var(--danger-bg);color:var(--danger);}

  .terr-pill{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:500;white-space:nowrap;}
  .t-NZ{background:#e8f0fb;color:#0057b8;}
  .t-Vanuatu{background:#e6f4ea;color:#1a6e2e;}
  .t-Solomons{background:#fef3dc;color:#8a5200;}
  .t-Tonga{background:#fdecea;color:#c0392b;}
  .t-Samoa{background:#f3e8fb;color:#6b21a8;}
  .t-Unassigned{background:#f0f0f0;color:#666;}

  /* AGE */
  .age-critical{color:var(--danger);font-weight:500;}
  .age-warn{color:var(--amber);font-weight:500;}
  .age-ok{color:var(--green);}

  .tech-name{font-size:12px;color:var(--mid);}
  .no-tech{font-size:11px;color:var(--muted);font-style:italic;}
  .subj{max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;}
  .acct{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;}

  .empty-state{padding:48px;text-align:center;color:var(--muted);font-size:13px;}

  footer{text-align:center;padding:20px;font-size:11px;color:var(--muted);border-top:1px solid var(--border);font-family:'DM Mono',monospace;}

  @media(max-width:900px){.kpi-strip{grid-template-columns:repeat(3,minmax(0,1fr));}.filter-bar input{width:160px;}}
  @media(max-width:600px){main{padding:12px 10px 48px;}header{padding:0 16px;}.header-title{display:none;}.kpi-strip{grid-template-columns:repeat(2,minmax(0,1fr));}}
</style>

document.getElementById("asOf").textContent = ASOF;

// ── SORT STATE ────────────────────────────────
let sortCol = 8, sortDir = -1; // default: age descending

// ── BADGE HELPERS ─────────────────────────────
function statusBadge(s) {
  if (s === "New") return `<span class="badge b-New">New</span>`;
  if (s === "Work Order Issued") return `<span class="badge b-WOI">Work Order Issued</span>`;
  if (s === "Processing Invoice") return `<span class="badge b-Invoice">Processing Invoice</span>`;
  if (s === "Escalated") return `<span class="badge b-Escalated">Escalated</span>`;
  if (s === "Stop Credit") return `<span class="badge b-Stop">Stop Credit</span>`;
  return `<span class="badge b-Waiting">${s}</span>`;
}
function terrPill(t) {
  const cls = t.replace(/\s/g,'');
  return `<span class="terr-pill t-${cls}">${t}</span>`;
}
function ageFmt(h) {
  if (h < 1) return `<span class="age-ok">&lt;1h</span>`;
  if (h < 24) return `<span class="age-ok">${h}h</span>`;
  const d = Math.floor(h/24);
  if (d < 3) return `<span class="age-ok">${d}d</span>`;
  if (d < 14) return `<span class="age-warn">${d}d</span>`;
  return `<span class="age-critical">${d}d</span>`;
}

// ── POPULATE FILTER DROPDOWNS ─────────────────
function populateFilters() {
  const statuses = [...new Set(CASES.map(c=>c[4]).filter(Boolean))].sort();
  const wts = [...new Set(CASES.map(c=>c[6]).filter(Boolean))].sort();
  const sel = document.getElementById("filterStatus");
  statuses.forEach(s => { const o=document.createElement("option"); o.value=o.textContent=s; sel.appendChild(o); });
  const selWt = document.getElementById("filterWorkType");
  wts.forEach(w => { const o=document.createElement("option"); o.value=o.textContent=w; selWt.appendChild(o); });
}

// ── FILTER + SORT ─────────────────────────────
function getFiltered() {
  const search = document.getElementById("searchInput").value.toLowerCase();
  const terr   = document.getElementById("filterTerritory").value;
  const status = document.getElementById("filterStatus").value;
  const wt     = document.getElementById("filterWorkType").value;
  const age    = parseInt(document.getElementById("filterAge").value) || 0;

  return CASES.filter(c => {
    if (terr   && c[5] !== terr)   return false;
    if (status && c[4] !== status) return false;
    if (wt     && c[6] !== wt)     return false;
    if (age    && c[8] < age)      return false;
    if (search) {
      const hay = (c[1]+c[2]+c[3]+c[4]+c[5]+c[6]+c[7]).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  }).sort((a,b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (typeof av === "string") av = av.toLowerCase();
    if (typeof bv === "string") bv = bv.toLowerCase();
    return av < bv ? sortDir : av > bv ? -sortDir : 0;
  });
}

// ── KPI STRIP ─────────────────────────────────
// Territory tiles always count from full CASES so they never zero out when a territory filter is active
function renderKPIs(filteredRows) {
  const terrs      = ["NZ","Vanuatu","Solomons","Tonga","Samoa"];
  const activeTerr = document.getElementById("filterTerritory").value;

  // All-territories tile reflects any active search/status/age filters
  const total  = filteredRows.length;
  const over72 = filteredRows.filter(c=>c[8]>=72).length;

  let html = `
    <div class="kpi-card ${!activeTerr?'selected':''}" onclick="setTerrFilter('')">
      <div class="kpi-label">All territories</div>
      <div class="kpi-value">${total}</div>
      <div class="kpi-sub">${over72} over 72h</div>
    </div>`;

  // Each territory tile always shows its total from the full dataset
  terrs.forEach(t => {
    const n   = CASES.filter(c=>c[5]===t).length;
    const n72 = CASES.filter(c=>c[5]===t&&c[8]>=72).length;
    html += `
    <div class="kpi-card ${activeTerr===t?'selected':''}" onclick="setTerrFilter('${t}')">
      <div class="kpi-label">${t}</div>
      <div class="kpi-value ${n72===n&&n>0?'alert':''}">${n}</div>
      <div class="kpi-sub">${n72} over 72h</div>
    </div>`;
  });
  document.getElementById("kpiStrip").innerHTML = html;
}

// ── RENDER TABLE ──────────────────────────────
function renderTable() {
  const rows = getFiltered();
  renderKPIs(rows);
  document.getElementById("resultCount").textContent = `${rows.length} of ${CASES.length} cases`;

  if (!rows.length) {
    document.getElementById("tableBody").innerHTML =
      `<tr><td colspan="8"><div class="empty-state">No cases match the current filters.</div></td></tr>`;
    return;
  }

  document.getElementById("tableBody").innerHTML = rows.map(c => {
    const [sfId,caseNum,acct,subj,status,terr,wt,tech,hours] = c;
    const url = SF_BASE + sfId;
    return `<tr>
      <td><a href="${url}" target="_blank" class="case-link">${caseNum}</a></td>
      <td><div class="acct" title="${acct}">${acct||'—'}</div></td>
      <td><div class="subj" title="${subj}">${subj||'—'}</div></td>
      <td>${terrPill(terr)}</td>
      <td>${statusBadge(status)}</td>
      <td><span style="font-size:12px;color:var(--mid)">${wt||'—'}</span></td>
      <td style="white-space:nowrap">${ageFmt(hours)}</td>
      <td>${tech?`<span class="tech-name">${tech}</span>`:`<span class="no-tech">Unassigned</span>`}</td>
    </tr>`;
  }).join("");

  // Update sort indicators
  document.querySelectorAll("th").forEach(th => {
    th.classList.remove("sorted-asc","sorted-desc");
    if (parseInt(th.dataset.col)===sortCol)
      th.classList.add(sortDir===1?"sorted-asc":"sorted-desc");
  });
}

function applyFilters() { renderTable(); }

function setTerrFilter(t) {
  document.getElementById("filterTerritory").value = t;
  renderTable();
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = -1; }
  renderTable();
}

function clearFilters() {
  document.getElementById("searchInput").value = "";
  document.getElementById("filterTerritory").value = "";
  document.getElementById("filterStatus").value = "";
  document.getElementById("filterWorkType").value = "";
  document.getElementById("filterAge").value = "";
  sortCol = 8; sortDir = -1;
  renderTable();
}

// ── URL PARAM INIT ───────────────────────────
// Reads ?territory=NZ&status=Processing+Invoice&worktype=Service+Call from URL
// so that links from service-dashboard.html pre-filter the table on arrival
function initFromURL() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('territory')) document.getElementById("filterTerritory").value = params.get('territory');
  if (params.get('status'))    document.getElementById("filterStatus").value    = params.get('status');
  if (params.get('worktype'))  document.getElementById("filterWorkType").value  = params.get('worktype');
  if (params.get('age'))       document.getElementById("filterAge").value       = params.get('age');
}

// ── INIT ──────────────────────────────────────
populateFilters();
initFromURL();
renderTable();
</script>
