<!DOCTYPE html>
<html lang="en">
<head>
  <script src="auth.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSP Level 10 Dashboards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #D7063B;
    --red-dark: #a8002d;
    --red-glow: rgba(215, 6, 59, 0.15);
    --charcoal: #1a1a1a;
    --dark: #111111;
    --mid: #2e2e2e;
    --muted: #666666;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(215, 6, 59, 0.4);
    --text: #f0f0f0;
    --text-dim: #888888;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  header {
    padding: 0 48px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    width: 120px;
    height: 2px;
    background: var(--red);
  }

  .header-right {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
  }

  /* ── MAIN ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }

  /* ── EYEBROW ── */
  .eyebrow {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.1s both;
  }

  /* ── HEADING ── */
  h1 {
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 300;
    letter-spacing: -0.01em;
    color: var(--text);
    text-align: center;
    line-height: 1.15;
    margin-bottom: 12px;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.2s both;
  }

  h1 strong {
    font-weight: 600;
    color: #fff;
  }

  .subtitle {
    font-size: 14px;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 64px;
    font-weight: 300;
    letter-spacing: 0.02em;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.3s both;
  }

  /* ── GRID ── */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 16px;
    width: 100%;
    max-width: 1260px;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.4s both;
  }

  /* ── CARDS ── */
  .card {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    padding: 36px 20px 32px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--mid);
    transition: border-color 0.2s, background 0.2s, transform 0.2s;
    overflow: hidden;
    gap: 14px;
    cursor: pointer;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, var(--red-glow), transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .card:hover {
    border-color: var(--border-hover);
    background: #222;
    transform: translateY(-3px);
  }

  .card:hover::before {
    opacity: 1;
  }

  .card.disabled {
    cursor: default;
    opacity: 0.45;
  }

  .card.disabled:hover {
    border-color: var(--border);
    background: var(--mid);
    transform: none;
  }

  .card.disabled:hover::before {
    opacity: 0;
  }

  /* Icon */
  .card-icon {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    transition: border-color 0.2s;
  }

  .card:hover .card-icon {
    border-color: rgba(215, 6, 59, 0.5);
  }

  .card-icon svg {
    width: 20px;
    height: 20px;
    stroke: var(--text-dim);
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 0.2s;
  }

  .card:hover .card-icon svg {
    stroke: var(--red);
  }

  .card-label {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text);
    position: relative;
    z-index: 1;
    text-align: center;
  }

  .card-coming {
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }

  /* Active card accent */
  .card.active-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--red);
  }

  /* ── FOOTER ── */
  footer {
    padding: 20px 48px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .footer-copy {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.04em;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4caf50;
    animation: pulse 2s infinite;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.35; }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 1000px) {
    .card-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
  }

  @media (max-width: 600px) {
    .card-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    header, footer { padding: 0 20px; }
    footer { flex-direction: column; gap: 8px; text-align: center; }
  }

  @media (max-width: 380px) {
    .card-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  }
</style>
</head>
<body>

<header>
  <img src="ricoh-logo-white-on-transparent.png" alt="Ricoh" style="height:28px;display:block;">
  <span class="header-right"></span>
</header>

<main>
  <div class="eyebrow">Ricoh South Pacific</div>
  <h1>Level 10 <strong>Dashboards</strong></h1>
  <p class="subtitle">Make Every Moment Matter</p>

  <div class="card-grid">

    <!-- SALES -->
    <a href="sales-dashboard.html" class="card active-card">
      <div class="card-icon">
        <svg viewBox="0 0 24 24">
          <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
          <polyline points="16 7 22 7 22 13"/>
        </svg>
      </div>
      <span class="card-label">Sales</span>
    </a>

    <!-- SERVICE -->
    <a href="service-dashboard.html" class="card active-card">
      <div class="card-icon">
        <svg viewBox="0 0 24 24">
          <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
        </svg>
      </div>
      <span class="card-label">Service</span>
    </a>

    <!-- ORDERS -->
    <a href="orders-dashboard.html" class="card active-card">
      <div class="card-icon">
        <svg viewBox="0 0 24 24">
          <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="1"/>
          <line x1="9" y1="12" x2="15" y2="12"/>
          <line x1="9" y1="16" x2="13" y2="16"/>
        </svg>
      </div>
      <span class="card-label">Orders</span>
    </a>

    <!-- INVENTORY -->
    <a href="inventory-dashboard.html" class="card active-card">
      <div class="card-icon">
        <svg viewBox="0 0 24 24">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
          <line x1="12" y1="22.08" x2="12" y2="12"/>
        </svg>
      </div>
      <span class="card-label">Inventory</span>
    </a>

    <!-- OPERATIONS -->
    <a href="operations-dashboard.html" class="card active-card">
      <div class="card-icon">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M4.93 4.93a10 10 0 0 0 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          <path d="M8.46 8.46a5 5 0 0 0 0 7.07"/>
        </svg>
      </div>
      <span class="card-label">Operations</span>
    </a>

    <!-- FINANCE -->
    <a href="finance-dashboard.html" class="card active-card">
      <div class="card-icon">
        <svg viewBox="0 0 24 24">
          <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
          <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
          <line x1="12" y1="12" x2="12" y2="16"/>
          <line x1="10" y1="14" x2="14" y2="14"/>
        </svg>
      </div>
      <span class="card-label">Finance</span>
    </a>

  </div>
</main>

<footer>
  <span class="footer-copy">Ricoh South Pacific · ClearEdge</span>
  <span class="live-badge">
    <span class="live-dot"></span>
    Connected to BMS, Salesforce, Xero, Unleashed
  </span>
</footer>

</body>
</html>
