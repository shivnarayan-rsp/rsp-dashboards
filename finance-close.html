<!DOCTYPE html>
<html lang="en">
<head>
  <script src="auth.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSP — Month-End Close</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --red:#D7063B; --red-dark:#a8002d;
      --charcoal:#1a1a1a; --dark:#2a2a2a; --mid:#444; --muted:#888;
      --border:#e5e5e5; --bg:#f7f7f6; --surface:#fff; --surface2:#f2f2f1;
      --green:#1a6e2e; --green-bg:#e6f4ea; --green-border:#b7dfbe;
      --amber:#8a5200; --amber-bg:#fef3dc; --amber-border:#f5d87e;
      --danger:#c0392b; --danger-bg:#fdecea; --danger-border:#f5bcb7;
      --blue:#0057b8; --blue-bg:#e8f0fb; --blue-border:#b3cfee;
      --purple:#5b21b6; --purple-bg:#ede9fe; --purple-border:#c4b5fd;
    }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--charcoal); min-height:100vh; -webkit-font-smoothing:antialiased; }

    /* HEADER */
    header { background:var(--charcoal); border-bottom:3px solid var(--red); padding:0 32px; height:60px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
    .header-left { display:flex; align-items:center; gap:16px; }
    .header-brand { font-size:18px; font-weight:700; color:white; }
    .header-brand span { color:var(--red); }
    .hd { width:1px; height:22px; background:#444; }
    .header-title { font-size:13px; color:#aaa; letter-spacing:.03em; }
    .header-right { display:flex; align-items:center; gap:16px; }
    .period-chip { font-family:'DM Mono',monospace; font-size:11px; color:#aaa; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.12); padding:4px 10px; border-radius:4px; }
    .back-link { font-size:11px; color:#666; text-decoration:none; transition:color .15s; }
    .back-link:hover { color:#aaa; }

    main { max-width:1400px; margin:0 auto; padding:28px 24px 64px; }

    /* NAV PILLS */
    .nav-pills { display:flex; gap:8px; margin-bottom:28px; flex-wrap:wrap; }
    .nav-pill { padding:7px 16px; font-size:12px; font-weight:500; border-radius:20px; border:1px solid var(--border); background:var(--surface); color:var(--mid); text-decoration:none; transition:all .15s; white-space:nowrap; }
    .nav-pill:hover { border-color:var(--red); color:var(--red); }
    .nav-pill.active { background:var(--charcoal); border-color:var(--charcoal); color:#fff; }

    /* SECTION LABEL */
    .section-label { font-size:10px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:12px; display:flex; align-items:center; gap:10px; }
    .section-label::after { content:''; flex:1; height:1px; background:var(--border); }

    /* OVERVIEW GRID */
    .overview-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:10px; margin-bottom:28px; }
    .entity-card { background:var(--surface); border:1px solid var(--border); border-top:3px solid var(--border); border-radius:6px; padding:14px 16px; cursor:pointer; transition:all .15s; text-align:center; }
    .entity-card:hover { box-shadow:0 2px 12px rgba(0,0,0,.07); }
    .entity-card.active { border-top-color:var(--red); box-shadow:0 0 0 2px rgba(215,6,59,.12); }
    .entity-card.complete { border-top-color:var(--green); }
    .ec-name { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:8px; }
    .ec-ring { display:flex; justify-content:center; margin-bottom:6px; }
    .ec-stat { font-size:11px; color:var(--mid); font-family:'DM Mono',monospace; }
    .ec-blocking { font-size:10px; color:var(--amber); margin-top:3px; }

    /* ENTITY TABS */
    .entity-tabs { display:flex; gap:0; border-bottom:2px solid var(--border); margin-bottom:20px; overflow-x:auto; }
    .entity-tab { padding:10px 18px; font-size:12px; font-weight:500; color:var(--muted); background:none; border:none; border-bottom:2px solid transparent; margin-bottom:-2px; cursor:pointer; white-space:nowrap; transition:all .15s; font-family:'DM Sans',sans-serif; }
    .entity-tab:hover { color:var(--charcoal); }
    .entity-tab.active { color:var(--red); border-bottom-color:var(--red); font-weight:600; }

    /* TASK CARDS */
    .category-label { font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin:20px 0 8px; display:flex; align-items:center; gap:8px; }
    .category-label::after { content:''; flex:1; height:1px; background:var(--border); }

    .task-card { background:var(--surface); border:1px solid var(--border); border-left:3px solid transparent; border-radius:6px; padding:14px 18px; margin-bottom:8px; display:grid; grid-template-columns:28px 1fr auto; gap:14px; align-items:start; transition:all .15s; }
    .task-card:hover { box-shadow:0 2px 8px rgba(0,0,0,.05); }
    .task-card.done { opacity:.6; background:var(--surface2); }
    .task-card.flagged { border-left-color:var(--danger); background:var(--danger-bg); }
    .task-card.in_progress { border-left-color:var(--amber); }
    .task-card.blocked-card { opacity:.45; pointer-events:none; }
    .task-card.owner-shikha { border-left-color:var(--purple-border); }
    .task-card.owner-ranika { border-left-color:var(--green-border); }

    .task-num { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); padding-top:2px; }
    .task-name { font-size:13px; font-weight:600; color:var(--charcoal); margin-bottom:3px; }
    .task-desc { font-size:12px; color:var(--mid); line-height:1.5; margin-bottom:8px; }
    .task-meta { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }

    .owner-badge { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; padding:2px 7px; border-radius:3px; }
    .ob-minoo  { background:var(--blue-bg); color:var(--blue); }
    .ob-shikha { background:var(--purple-bg); color:var(--purple); }
    .ob-ranika { background:var(--green-bg); color:var(--green); }

    .status-pill { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; padding:2px 7px; border-radius:3px; display:inline-block; }
    .sp-done     { background:var(--green-bg); color:var(--green); }
    .sp-flagged  { background:var(--danger-bg); color:var(--danger); }
    .sp-progress { background:var(--amber-bg); color:var(--amber); }
    .sp-na       { background:var(--surface2); color:var(--muted); }

    .blocking-bar { background:var(--amber-bg); border:1px solid var(--amber-border); border-radius:4px; padding:7px 12px; font-size:11px; color:#633806; display:flex; align-items:center; gap:6px; margin-top:6px; }

    .task-notes { width:100%; font-family:'DM Sans',sans-serif; font-size:12px; border:1px solid var(--border); border-radius:4px; padding:7px 10px; resize:none; min-height:44px; color:var(--mid); background:var(--bg); transition:border-color .15s; margin-top:8px; }
    .task-notes:focus { outline:none; border-color:var(--red); background:white; }

    .task-actions { display:flex; flex-direction:column; gap:6px; align-items:flex-end; min-width:120px; }
    .status-select { font-family:'DM Sans',sans-serif; font-size:11px; border:1px solid var(--border); border-radius:4px; padding:5px 8px; background:white; color:var(--charcoal); cursor:pointer; width:120px; }
    .status-select:focus { outline:none; border-color:var(--red); }
    .save-btn { font-family:'DM Sans',sans-serif; font-size:11px; font-weight:600; background:var(--charcoal); color:white; border:none; border-radius:4px; padding:6px 14px; cursor:pointer; width:120px; transition:background .15s; }
    .save-btn:hover { background:var(--dark); }
    .save-btn:disabled { opacity:.5; cursor:not-allowed; }
    .saved-note { font-size:11px; color:var(--green); font-weight:600; }

    .readonly-status { display:flex; flex-direction:column; gap:4px; align-items:flex-end; }
    .readonly-notes { font-size:11px; color:var(--mid); background:var(--surface2); border-radius:4px; padding:6px 10px; max-width:200px; line-height:1.4; margin-top:6px; text-align:right; }

    /* LOADING */
    .loading-state { text-align:center; padding:60px; color:var(--muted); }
    .spinner { width:28px; height:28px; border:3px solid var(--border); border-top-color:var(--red); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 12px; }
    @keyframes spin { to { transform:rotate(360deg); } }

    hr.divider { border:none; border-top:1px solid var(--border); margin:24px 0; }

    @media(max-width:1100px) { .overview-grid { grid-template-columns:repeat(3,1fr); } }
    @media(max-width:700px) { main { padding:16px; } .overview-grid { grid-template-columns:repeat(2,1fr); } .task-card { grid-template-columns:20px 1fr; } .task-actions { grid-column:1/-1; flex-direction:row; } }
  </style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="header-brand" style="display:flex;align-items:center;gap:12px;">
      <img src="ricoh-logo-white-on-transparent.png" alt="Ricoh" style="height:26px;display:block;" onerror="this.style.display='none'">
      <span style="color:rgba(255,255,255,.3);font-weight:300;font-size:18px;">|</span>
      <span style="font-size:13px;font-weight:400;color:rgba(255,255,255,.7);letter-spacing:.03em;">South Pacific</span>
    </div>
    <div class="hd"></div>
    <span class="header-title">Month-End Close — Minoo</span>
  </div>
  <div class="header-right">
    <span class="period-chip" id="periodChip">Loading…</span>
    <a href="finance-dashboard.html" class="back-link">← Finance Dashboard</a>
  </div>
</header>

<main>
  <div class="nav-pills">
    <a href="finance-dashboard.html" class="nav-pill">Finance Dashboard</a>
    <a href="finance-close.html" class="nav-pill active">Month-End Close</a>
    <a href="finance-drilldown.html" class="nav-pill">AR Drilldown</a>
    <a href="finance-data-dictionary.html" class="nav-pill">Data Dictionary</a>
  </div>

  <div class="section-label">Close Progress — All Entities</div>
  <div class="overview-grid" id="overviewGrid"></div>

  <div class="entity-tabs" id="entityTabs"></div>
  <div id="taskList">
    <div class="loading-state"><div class="spinner"></div><div>Loading close checklist…</div></div>
  </div>
</main>

<script>
const SUPABASE_URL = 'https://dztsgkpqgcnebqhkuyeu.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ozzi1WvvklaFYx_Fx3JuPQ_tmkkJ8kz';
const ENTITIES = ['RSP','Alpine','Samoa','Solomons','Tonga','Vanuatu'];
const CATEGORIES = {
  revenue_inputs:'Pre-Close Inputs',
  inventory:'Inventory',
  revenue:'Revenue',
  cogs:'Cost of Goods Sold',
  interco:'Intercompany',
  opex:'Operating Expenses',
  ar:'Accounts Receivable',
  banking:'Banking',
  statutory:'Statutory & Compliance',
  reporting:'Reporting',
};
const BLOCKED_BY = {
  4:[1,2,3], 5:[4], 6:[5], 7:[5], 8:[3], 9:[8], 10:[9], 11:[10], 12:[11], 13:[12], 14:[13], 15:[14], 16:[14], 17:[16], 18:['all'],
};

let currentEntity = 'RSP';
let period = null;
let tasks = [];
let statutory = {};
let statusMap = {};

async function sb(path, opts={}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers:{ 'apikey':SUPABASE_KEY, 'Authorization':`Bearer ${SUPABASE_KEY}`, 'Content-Type':'application/json', 'Prefer':opts.prefer||'return=representation', ...opts.headers },
    ...opts,
  });
  if (!res.ok) throw new Error(await res.text());
  return res.status===204 ? null : res.json();
}

async function init() {
  try {
    const [periods, taskRows, statutoryRows] = await Promise.all([
      sb('month_close_periods?status=eq.open&order=month_label.desc&limit=1'),
      sb('month_close_tasks?order=sort_order.asc'),
      sb('month_close_statutory?order=entity.asc,task_number.asc'),
    ]);
    period = periods[0];
    tasks  = taskRows;
    statutoryRows.forEach(r => { statutory[`${r.entity}_${r.task_number}`] = r; });
    document.getElementById('periodChip').textContent = period ? period.display_label + ' Close' : 'No open period';
    if (period) {
      const statuses = await sb(`month_close_status?period_id=eq.${period.id}`);
      statuses.forEach(r => { statusMap[`${r.task_number}_${r.entity}`] = r; });
    }
    renderOverview(); renderTabs(); renderTasks();
  } catch(err) {
    document.getElementById('taskList').innerHTML = `<div style="padding:24px;background:var(--danger-bg);border-radius:6px;color:var(--danger);font-size:13px;"><strong>Could not load close data.</strong><br>${err.message}<br><small>Check SUPABASE_URL and SUPABASE_KEY are configured.</small></div>`;
  }
}

function getStatus(n, e) { return statusMap[`${n}_${e}`] || {status:'not_started',notes:''}; }
function isDone(n, e) { return ['done','na'].includes(getStatus(n,e).status); }
function progress(entity) {
  const done = tasks.filter(t => isDone(t.task_number, entity)).length;
  return { done, total:tasks.length, pct:Math.round(done/tasks.length*100) };
}
function isBlocked(task, entity) {
  const deps = BLOCKED_BY[task.task_number];
  if (!deps) return false;
  if (deps === 'all') return !tasks.filter(t => t.task_number !== 18).every(t => isDone(t.task_number, entity));
  return deps.some(d => !isDone(d, entity));
}
function blockingOwners(task, entity) {
  const deps = BLOCKED_BY[task.task_number];
  if (!deps || deps==='all') return [];
  return [...new Set(deps.filter(d => !isDone(d,entity)).map(d => tasks.find(t=>t.task_number===d)).filter(Boolean).map(t => t.owner.charAt(0).toUpperCase()+t.owner.slice(1)))];
}

function renderOverview() {
  document.getElementById('overviewGrid').innerHTML = ENTITIES.map(entity => {
    const {done,total,pct} = progress(entity);
    const blocking = tasks.filter(t => t.owner!=='minoo' && !isDone(t.task_number,entity));
    const colour = pct===100?'#1a6e2e':pct>50?'#8a5200':'var(--red)';
    const dash = Math.round(pct/100*126);
    return `<div class="entity-card ${entity===currentEntity?'active':''} ${pct===100?'complete':''}" onclick="switchEntity('${entity}')">
      <div class="ec-name">${entity}</div>
      <div class="ec-ring">
        <svg width="52" height="52" viewBox="0 0 52 52">
          <circle cx="26" cy="26" r="20" fill="none" stroke="#e5e5e5" stroke-width="5"/>
          <circle cx="26" cy="26" r="20" fill="none" stroke="${colour}" stroke-width="5"
            stroke-dasharray="${dash} 126" stroke-linecap="round" transform="rotate(-90 26 26)"/>
          <text x="26" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="${colour}" font-family="DM Mono">${pct}%</text>
        </svg>
      </div>
      <div class="ec-stat">${done}/${total}</div>
      ${blocking.length>0?`<div class="ec-blocking">⏳ ${blocking.length} pending</div>`:''}
    </div>`;
  }).join('');
}

function renderTabs() {
  document.getElementById('entityTabs').innerHTML = ENTITIES.map(entity => {
    const {pct} = progress(entity);
    return `<button class="entity-tab ${entity===currentEntity?'active':''}" onclick="switchEntity('${entity}')">${entity}${pct===100?' ✓':''}</button>`;
  }).join('');
}

function renderTasks() {
  const entity = currentEntity;
  let html = '';
  let lastCat = null;
  tasks.forEach(task => {
    const st = getStatus(task.task_number, entity);
    const blocked = isBlocked(task, entity);
    const owners  = blockingOwners(task, entity);
    const done    = isDone(task.task_number, entity);
    const flagged = st.status==='flagged';

    let taskName = task.name;
    let taskDesc = task.description;
    if ([15,16,17].includes(task.task_number)) {
      const stat = statutory[`${entity}_${task.task_number}`];
      if (stat) {
        taskName = stat.local_name + (stat.shikha_lodges_directly ? '' : ` — confirm with ${stat.local_contact_label}`);
        taskDesc = stat.shikha_lodges_directly
          ? `Shikha lodges directly. ${task.description}`
          : `Shikha confirms with ${stat.local_contact_label}. ${task.description}`;
      }
    }

    if (task.category !== lastCat) {
      html += `<div class="category-label">${CATEGORIES[task.category]||task.category}</div>`;
      lastCat = task.category;
    }

    const ownerClass = `owner-${task.owner}`;
    const cardClass = [done?'done':'', flagged?'flagged':'', st.status==='in_progress'?'in_progress':'', blocked?'blocked-card':'', task.owner!=='minoo'?`owner-${task.owner}`:''].filter(Boolean).join(' ');

    html += `<div class="task-card ${cardClass}" id="tc-${task.task_number}">
      <div class="task-num">#${task.task_number}</div>
      <div>
        <div class="task-name">${taskName}</div>
        <div class="task-desc">${taskDesc}</div>
        <div class="task-meta">
          <span class="owner-badge ob-${task.owner}">${task.owner}</span>
          ${done?`<span class="status-pill sp-${st.status}">${st.status.replace('_',' ')}</span>`:''}
          ${st.completed_by?`<span style="font-size:11px;color:var(--muted)">by ${st.completed_by}</span>`:''}
        </div>
        ${blocked&&owners.length>0?`<div class="blocking-bar">⏳ Waiting on: ${owners.join(', ')}</div>`:''}
        ${task.owner==='minoo'
          ? `<textarea class="task-notes" id="notes-${task.task_number}" placeholder="Notes, findings, variances…">${st.notes||''}</textarea>`
          : st.notes?`<div style="font-size:11px;color:var(--mid);margin-top:8px;padding:7px 10px;background:var(--surface2);border-radius:4px;line-height:1.4">${st.notes}</div>`:''
        }
      </div>
      <div class="task-actions">
        ${task.owner==='minoo' ? `
          <select class="status-select" id="sel-${task.task_number}">
            <option value="not_started" ${st.status==='not_started'?'selected':''}>Not started</option>
            <option value="in_progress" ${st.status==='in_progress'?'selected':''}>In progress</option>
            <option value="done"        ${st.status==='done'       ?'selected':''}>✓ Done</option>
            <option value="flagged"     ${st.status==='flagged'    ?'selected':''}>⚑ Flagged</option>
            <option value="na"          ${st.status==='na'         ?'selected':''}>N/A</option>
          </select>
          <button class="save-btn" onclick="saveTask(${task.task_number},'${entity}')">Save</button>
          <span class="saved-note" id="tick-${task.task_number}" style="display:none">✓ Saved</span>
        ` : `<span class="status-pill sp-${st.status||'not_started'}">${(st.status||'not started').replace('_',' ')}</span>`}
      </div>
    </div>`;
  });
  document.getElementById('taskList').innerHTML = html;
}

function switchEntity(entity) {
  currentEntity = entity;
  renderOverview(); renderTabs(); renderTasks();
}

async function saveTask(taskNum, entity) {
  if (!period) return;
  const btn  = document.querySelector(`#tc-${taskNum} .save-btn`);
  const tick = document.getElementById(`tick-${taskNum}`);
  const sel  = document.getElementById(`sel-${taskNum}`);
  const notes= document.getElementById(`notes-${taskNum}`)?.value||'';
  const status = sel.value;
  btn.textContent = 'Saving…'; btn.disabled = true;
  try {
    const payload = {
      period_id:period.id, task_number:taskNum, entity, status, notes,
      completed_by:'Minoo',
      completed_at:status==='done'?new Date().toISOString():null,
      updated_at:new Date().toISOString(),
    };
    await sb('month_close_status',{
      method:'POST', prefer:'resolution=merge-duplicates,return=minimal', body:JSON.stringify(payload),
    });
    statusMap[`${taskNum}_${entity}`] = payload;
    btn.textContent='Save'; btn.disabled=false;
    tick.style.display='inline';
    setTimeout(()=>{tick.style.display='none';},2000);
    renderOverview(); renderTabs(); renderTasks();
  } catch(err) {
    btn.textContent='Error — retry'; btn.disabled=false;
  }
}

init();
</script>
</body>
</html>
