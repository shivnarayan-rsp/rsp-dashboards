<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSP Group — Operations Drill-Down</title>
<style>
  :root {
    --green: #3B6D11; --green-bg: #EAF3DE; --green-text: #27500A;
    --amber: #BA7517; --amber-bg: #FAEEDA; --amber-text: #854F0B;
    --red: #A32D2D; --red-bg: #FCEBEB; --red-text: #791F1F;
    --gray-bg: #F1EFE8; --gray-text: #444441;
    --blue-bg: #E6F1FB; --blue-text: #0C447C;
    --surface: #ffffff; --page-bg: #F7F6F2;
    --text-primary: #2C2C2A; --text-secondary: #888780;
    --border: #D3D1C7; --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--page-bg); color: var(--text-primary); font-size: 14px; line-height: 1.5; }

  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .topbar-left { display: flex; align-items: center; gap: 14px; }
  .logo-mark { width: 32px; height: 32px; background: #2C2C2A; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  .logo-mark span { color: #fff; font-size: 11px; font-weight: 700; letter-spacing: -0.5px; }
  .topbar-title { font-size: 15px; font-weight: 600; }
  .topbar-sub { font-size: 12px; color: var(--text-secondary); }
  .back-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-primary); padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; text-decoration: none; transition: background 0.15s; }
  .back-btn:hover { background: var(--gray-bg); }

  .container { max-width: 1400px; margin: 0 auto; padding: 24px 28px; }

  /* ── Controls bar ── */
  .controls { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .controls-label { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
  .entity-filter { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 4px; flex-wrap: wrap; }
  .ef-btn { padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text-secondary); border: none; background: transparent; transition: all 0.15s; }
  .ef-btn.active { background: #2C2C2A; color: #fff; }
  .ef-btn:hover:not(.active) { background: var(--gray-bg); color: var(--text-primary); }
  .search-wrap { margin-left: auto; }
  .search-input { border: 1px solid var(--border); border-radius: 6px; padding: 7px 12px; font-size: 13px; background: var(--surface); color: var(--text-primary); width: 220px; outline: none; }
  .search-input:focus { border-color: #2C2C2A; }

  /* ── Doc type tabs ── */
  .doc-tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 2px solid var(--border); }
  .doc-tab { padding: 10px 22px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text-secondary); border: none; background: transparent; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.15s; }
  .doc-tab.active { color: var(--text-primary); border-bottom-color: #2C2C2A; }
  .doc-tab:hover:not(.active) { color: var(--text-primary); }
  .doc-tab .tab-count { display: inline-flex; align-items: center; justify-content: center; background: var(--gray-bg); color: var(--gray-text); border-radius: 20px; font-size: 11px; font-weight: 600; padding: 1px 7px; margin-left: 6px; }
  .doc-tab.active .tab-count { background: #2C2C2A; color: #fff; }

  /* ── Summary strip ── */
  .summary-strip { display: flex; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; }
  .sum-item { font-size: 12px; color: var(--text-secondary); }
  .sum-item strong { color: var(--text-primary); font-weight: 600; }
  .sum-item.warn strong { color: var(--amber); }
  .sum-item.alert strong { color: var(--red); }

  /* ── Table ── */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .table-wrap table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  .table-wrap th { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); padding: 10px 14px; text-align: left; background: var(--page-bg); border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .table-wrap th:hover { color: var(--text-primary); }
  .table-wrap th .sort-arrow { font-size: 9px; margin-left: 3px; opacity: 0.4; }
  .table-wrap th.sorted .sort-arrow { opacity: 1; }
  .table-wrap td { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; vertical-align: middle; }
  .table-wrap tr:last-child td { border-bottom: none; }
  .table-wrap tr:hover td { background: var(--gray-bg); }
  .row-submitted td:first-child { border-left: 3px solid var(--red); }
  .row-draft     td:first-child { border-left: 3px solid var(--amber); }

  .status-pill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .status-draft     { background: var(--amber-bg); color: var(--amber-text); }
  .status-submitted { background: var(--red-bg);   color: var(--red-text);   }

  .aging-cell { font-weight: 600; }
  .aging-green { color: var(--green); }
  .aging-amber { color: var(--amber); }
  .aging-red   { color: var(--red);   }

  .attach-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; color: var(--blue-text); background: var(--blue-bg); padding: 2px 7px; border-radius: 4px; }
  .no-attach { font-size: 11px; color: var(--text-secondary); }

  .xero-link { display: inline-flex; align-items: center; gap: 4px; color: var(--blue-text); font-size: 12px; font-weight: 500; text-decoration: none; padding: 3px 8px; border: 1px solid #B5D4F4; border-radius: 5px; background: var(--blue-bg); white-space: nowrap; transition: background 0.15s; }
  .xero-link:hover { background: #B5D4F4; }
  .inv-link { color: var(--blue-text); font-size: 12px; font-weight: 600; text-decoration: none; white-space: nowrap; }
  .inv-link:hover { text-decoration: underline; }

  .empty-state { padding: 48px; text-align: center; color: var(--text-secondary); font-size: 13px; }
  .empty-state strong { display: block; font-size: 15px; color: var(--text-primary); margin-bottom: 6px; }

  .entity-badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; background: var(--gray-bg); color: var(--gray-text); }

  .footer { text-align: center; padding: 24px; font-size: 12px; color: var(--text-secondary); border-top: 1px solid var(--border); margin-top: 12px; }
  .env-badge { display: inline-block; background: var(--blue-bg); color: var(--blue-text); padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }

  /* Column widths */
  .col-inv    { width: 130px; }
  .col-entity { width: 100px; }
  .col-status { width: 100px; }
  .col-cust   { width: 220px; }
  .col-date   { width: 100px; }
  .col-due    { width: 100px; }
  .col-age    { width: 75px; }
  .col-val    { width: 110px; }
  .col-ccy    { width: 55px; }
  .col-ref    { width: 140px; }
  .col-att    { width: 80px; }
</style>

</div>

<script>
const TODAY = new Date('2026-03-24');
function daysSince(d) { return d ? Math.round((TODAY - new Date(d)) / 86400000) : 0; }
function fmt(d) { if (!d) return '—'; const x = new Date(d); return x.toLocaleDateString('en-NZ', { day:'2-digit', month:'short', year:'numeric' }); }
function fmtAmt(v, ccy) {
  if (!v || parseFloat(v) === 0) return '<span style="color:var(--text-secondary)">—</span>';
  return new Intl.NumberFormat('en-NZ', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(parseFloat(v)) + ' <span style="font-size:11px;color:var(--text-secondary)">' + ccy + '</span>';
}
function agingLabel(days) {
  if (!days) return '<span style="color:var(--text-secondary)">—</span>';
  const cls = days <= 7 ? 'aging-green' : days <= 21 ? 'aging-amber' : 'aging-red';
  return `<span class="aging-cell ${cls}">${days}d</span>`;
}
function xeroLink(id, num, type) {
  const url = type === 'ACCREC'
    ? `https://go.xero.com/AccountsReceivable/View.aspx?InvoiceID=${id}`
    : `https://go.xero.com/AccountsPayable/View.aspx?InvoiceID=${id}`;
  return `<a class="inv-link" href="${url}" target="_blank" rel="noopener" title="Open in Xero">${num} &#8599;</a>`;
}

const ENTITY_LABELS = { samoa:'Ricoh Samoa', vanuatu:'Ricoh Vanuatu', tonga:'Ricoh Tonga', solomons:'Ricoh Solomons', rsp:'RSP (NZ)' };

// ── State ─────────────────────────────────────────────────────────────────────
let currentEntity  = 'all';
let currentDocType = 'invoices';
let sortCol        = 'age';
let sortAsc        = false;

// ── Filtering and sorting ─────────────────────────────────────────────────────
function getRows(entity, docType) {
  const entities = entity === 'all' ? Object.keys(RECORDS) : [entity];
  return entities.flatMap(e =>
    (RECORDS[e][docType] || []).map(r => ({ ...r, entity: e }))
  );
}

function applyFilters(rows) {
  const q = document.getElementById('search-box').value.toLowerCase();
  if (!q) return rows;
  return rows.filter(r =>
    r.contact.toLowerCase().includes(q) ||
    r.num.toLowerCase().includes(q) ||
    (r.ref || '').toLowerCase().includes(q)
  );
}

function sortRows(rows) {
  return [...rows].sort((a, b) => {
    let va, vb;
    if      (sortCol === 'age')     { va = daysSince(a.date); vb = daysSince(b.date); }
    else if (sortCol === 'amt')     { va = parseFloat(a.amtDue)||0; vb = parseFloat(b.amtDue)||0; }
    else if (sortCol === 'contact') { va = a.contact; vb = b.contact; }
    else if (sortCol === 'num')     { va = a.num; vb = b.num; }
    else if (sortCol === 'date')    { va = new Date(a.date); vb = new Date(b.date); }
    else if (sortCol === 'due')     { va = new Date(a.due||'9999'); vb = new Date(b.due||'9999'); }
    else if (sortCol === 'status')  { va = a.status; vb = b.status; }
    else if (sortCol === 'entity')  { va = a.entity; vb = b.entity; }
    else return 0;
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });
}

function setSort(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = col === 'contact' || col === 'num'; }
  render();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const invRows   = getRows(currentEntity, 'invoices');
  const billRows  = getRows(currentEntity, 'bills');
  document.getElementById('count-inv').textContent   = invRows.length;
  document.getElementById('count-bills').textContent = billRows.length;

  const rows     = applyFilters(sortRows(getRows(currentEntity, currentDocType)));
  const docType  = currentDocType === 'invoices' ? 'ACCREC' : 'ACCPAY';

  // Summary strip
  const total    = rows.length;
  const aged     = rows.filter(r => daysSince(r.date) > 7).length;
  const totalAmt = rows.reduce((a, r) => a + (parseFloat(r.amtDue)||0), 0);
  document.getElementById('summary-strip').innerHTML = `
    <div class="sum-item">Showing <strong>${total}</strong> records</div>
    <div class="sum-item ${aged > 10 ? 'alert' : aged > 4 ? 'warn' : ''}">Aged &gt; 7 days: <strong>${aged}</strong></div>
    <div class="sum-item">Total amount due: <strong>${new Intl.NumberFormat('en-NZ', {minimumFractionDigits:2,maximumFractionDigits:2}).format(totalAmt)}</strong> (mixed currencies)</div>
  `;

  if (!rows.length) {
    document.getElementById('table-wrap').innerHTML = `<div class="empty-state"><strong>No records found</strong>Try adjusting the entity filter or search term.</div>`;
    return;
  }

  const arrow = (col) => `<span class="sort-arrow">${sortCol===col ? (sortAsc?'&#9650;':'&#9660;') : '&#9660;'}</span>`;
  const th = (col, label, cls='') => `<th class="${sortCol===col?'sorted':''} ${cls}" onclick="setSort('${col}')">${label}${arrow(col)}</th>`;

  const showEntity = currentEntity === 'all';

  document.getElementById('table-wrap').innerHTML = `
    <table>
      <colgroup>
        <col class="col-inv">
        ${showEntity ? '<col class="col-entity">' : ''}
        <col class="col-status">
        <col class="col-cust">
        <col class="col-date">
        <col class="col-due">
        <col class="col-age">
        <col class="col-val">
        <col class="col-ccy">
        <col class="col-ref">
        <col class="col-att">
      </colgroup>
      <thead>
        <tr>
          ${th('num','Invoice #','col-inv')}
          ${showEntity ? th('entity','Entity','col-entity') : ''}
          ${th('status','Status','col-status')}
          ${th('contact','Customer / Supplier','col-cust')}
          ${th('date','Date','col-date')}
          ${th('due','Due','col-due')}
          ${th('age','Age','col-age')}
          ${th('amt','Amt Due','col-val')}
          <th class="col-ccy">CCY</th>
          <th class="col-ref">Reference</th>
          <th class="col-att">Files</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(r => {
          const age = daysSince(r.date);
          return `
            <tr class="row-${r.status.toLowerCase()}">
              <td title="Open ${r.num} in Xero">${xeroLink(r.id, r.num, docType)}</td>
              ${showEntity ? `<td><span class="entity-badge">${ENTITY_LABELS[r.entity]||r.entity}</span></td>` : ''}
              <td><span class="status-pill status-${r.status.toLowerCase()}">${r.status}</span></td>
              <td title="${r.contact}">${r.contact}</td>
              <td>${fmt(r.date)}</td>
              <td>${fmt(r.due)}</td>
              <td>${agingLabel(age)}</td>
              <td>${fmtAmt(r.amtDue, r.ccy)}</td>
              <td style="color:var(--text-secondary);font-size:12px">${r.ccy}</td>
              <td title="${r.ref||''}" style="color:var(--text-secondary);font-size:12px">${r.ref||'—'}</td>
              <td>${r.attach ? '<span class="attach-badge">&#128206; Yes</span>' : '<span class="no-attach">—</span>'}</td>
            </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

function setEntity(key, el) {
  document.querySelectorAll('.ef-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentEntity = key;
  render();
}

function setDocType(type) {
  currentDocType = type;
  document.getElementById('tab-inv').classList.toggle('active',   type === 'invoices');
  document.getElementById('tab-bills').classList.toggle('active', type === 'bills');
  render();
}

// Read URL params on load
(function() {
  const p = new URLSearchParams(window.location.search);
  if (p.get('entity')) {
    currentEntity = p.get('entity');
    document.querySelectorAll('.ef-btn').forEach(b => {
      b.classList.toggle('active', b.getAttribute('onclick').includes(`'${currentEntity}'`));
    });
  }
  if (p.get('type') === 'bills') setDocType('bills');
  render();
})();
</script>
