<!DOCTYPE html>
<html lang="en">
<head>
  <script src="auth.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSP — Service Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --red:#D7063B; --red-dark:#a8002d; --red-light:#f5e0e6;
    --charcoal:#1a1a1a; --dark:#2a2a2a; --mid:#444; --muted:#888;
    --border:#e5e5e5; --bg:#f7f7f6; --surface:#fff; --surface2:#f2f2f1;
    --green:#1a6e2e; --green-bg:#e6f4ea;
    --amber:#8a5200; --amber-bg:#fef3dc;
    --danger:#c0392b; --danger-bg:#fdecea;
    --blue:#0057b8; --blue-bg:#e8f0fb;
    --gray:#555; --gray-bg:#efefef;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--charcoal);min-height:100vh;-webkit-font-smoothing:antialiased;}

  /* ── HEADER ── */
  header {
    background: var(--charcoal);
    color: white;
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header-brand {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: white;
  }
  .header-brand span { color: var(--red); }
  .header-divider {
    width: 1px;
    height: 24px;
    background: rgba(255,255,255,0.2);
  }
  .header-subtitle {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    font-weight: 400;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.06em;
  }
  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4caf50;
    animation: pulse 2s infinite;
  }
  .as-of {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    font-family: 'DM Mono', monospace;
  }
  .back-link {
    color: rgba(255,255,255,0.6);
    text-decoration: none;
    font-size: 13px;
    transition: color 0.15s;
  }
  .back-link:hover { color: white; }

  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

  /* LAYOUT */
  main{max-width:1200px;margin:0 auto;padding:32px 24px 64px;}

  /* SECTION LABEL */
  .section-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:10px;}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border);}

  /* KPI GRID */
  .kpi-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:32px;}
  .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:18px 20px;position:relative;overflow:hidden;transition:box-shadow .15s;animation:fadeUp .4s ease both;}
  .kpi-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.07);}
  .kpi-card.accent::before,.kpi-card.alert::before,.kpi-card.good::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
  .kpi-card.accent::before{background:var(--red);}
  .kpi-card.alert::before{background:var(--red);}
  .kpi-card.good::before{background:var(--green);}
  .kpi-card:nth-child(1){animation-delay:.05s;}.kpi-card:nth-child(2){animation-delay:.1s;}.kpi-card:nth-child(3){animation-delay:.15s;}.kpi-card:nth-child(4){animation-delay:.2s;}
  .kpi-label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;}
  .kpi-value{font-size:32px;font-weight:300;color:var(--charcoal);line-height:1;margin-bottom:6px;font-variant-numeric:tabular-nums;}
  .kpi-value.alert{color:var(--danger);}.kpi-value.good{color:var(--green);}.kpi-value.muted{color:var(--mid);}
  .kpi-sub{font-size:11px;color:var(--muted);line-height:1.4;}
  .kpi-trend{font-size:11px;margin-top:5px;font-weight:500;}
  .trend-good{color:var(--green);}.trend-bad{color:var(--danger);}
  .progress-bar{height:4px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden;}
  .progress-fill{height:100%;border-radius:2px;}
  .fill-green{background:var(--green);}.fill-muted{background:var(--muted);}

  /* DIVIDER */
  hr.divider{border:none;border-top:1px solid var(--border);margin:28px 0;}

  /* TABS */
  .tab-container{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:32px;}
  .tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--surface2);padding:0 4px;gap:2px;}
  .tab-btn{padding:12px 18px;font-size:11px;font-weight:500;color:var(--muted);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s;letter-spacing:.07em;font-family:'DM Sans',sans-serif;text-transform:uppercase;}
  .tab-btn:hover{color:var(--charcoal);}
  .tab-btn.active{color:var(--red);border-bottom-color:var(--red);font-weight:600;}
  .tab-panel{display:none;}.tab-panel.active{display:block;}

  /* TABLE */
  table{width:100%;border-collapse:collapse;}
  th{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);padding:10px 16px;text-align:left;border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap;}
  th.right{text-align:right;}
  td{padding:10px 16px;font-size:13px;color:var(--charcoal);border-bottom:1px solid #f0f0f0;vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  td.indent{padding-left:32px;}
  td.count{text-align:right;font-family:'DM Mono',monospace;font-weight:500;font-size:13px;}
  td.pct{text-align:right;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;}
  td.danger{color:var(--danger);font-weight:500;}
  .tr-territory td{background:var(--surface2);font-weight:600;font-size:12px;color:var(--mid);text-transform:uppercase;letter-spacing:.06em;padding:8px 16px;border-bottom:1px solid var(--border);}
  .tr-territory .terr-count{font-weight:400;color:var(--muted);text-transform:none;letter-spacing:0;font-family:'DM Mono',monospace;font-size:11px;margin-left:8px;}
  .total-row td{font-weight:600;border-top:1px solid var(--border);background:var(--surface2);}

  /* BADGE */
  .badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:500;white-space:nowrap;letter-spacing:.02em;}
  .b-New{background:var(--blue-bg);color:var(--blue);}
  .b-WOI{background:var(--green-bg);color:var(--green);}
  .b-Invoice{background:var(--amber-bg);color:var(--amber);}
  .b-Waiting{background:var(--gray-bg);color:var(--gray);}
  .b-Escalated,.b-Stop{background:var(--danger-bg);color:var(--danger);}

  /* INLINE BAR */
  .bar-bg{height:5px;background:var(--border);border-radius:3px;overflow:hidden;width:100px;}
  .bar-fill{height:100%;border-radius:3px;background:var(--red);}
  .bar-fill.muted{background:var(--muted);}

  /* OVER 72h GRID */
  .overage-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1px;background:var(--border);}
  .overage-cell{background:var(--surface);padding:18px 20px;}
  .overage-name{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px;}
  .overage-nums{display:flex;align-items:baseline;gap:6px;margin-bottom:6px;}
  .overage-big{font-size:28px;font-weight:300;color:var(--danger);font-variant-numeric:tabular-nums;line-height:1;}
  .overage-of{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;}
  .overage-pct{font-size:11px;font-weight:500;color:var(--danger);margin-bottom:6px;}
  .overage-bar-bg{height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
  .overage-bar-fill{height:100%;background:var(--red);border-radius:2px;}
  .overage-total-row{padding:14px 20px;background:var(--surface2);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .overage-total-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);}
  .overage-total-val{font-size:13px;font-weight:600;color:var(--danger);font-family:'DM Mono',monospace;}

  /* FOOTER */
  footer{text-align:center;padding:24px;font-size:11px;color:var(--muted);border-top:1px solid var(--border);font-family:'DM Mono',monospace;letter-spacing:.04em;}

  @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

  @media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,minmax(0,1fr));}.overage-grid{grid-template-columns:repeat(2,minmax(0,1fr));}}
  @media(max-width:600px){main{padding:16px 12px 48px;}header{padding:0 16px;}.header-subtitle{display:none;}.kpi-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="header-brand">Ricoh South Pacific</div>
    <div class="header-divider"></div>
    <div class="header-subtitle">Service Dashboard</div>
  </div>
  <div class="header-right">
    <span class="live-badge"><span class="live-dot"></span>LIVE</span>
    <span class="as-of" id="asOf"></span>
    <a href="index.html" class="back-link">← Scorecards</a>
  </div>
</header>

<main>
  <div class="section-label">Open cases snapshot</div>
  <div class="kpi-grid" id="kpiSnapshot"></div>

  <hr class="divider">

  <div class="section-label">Service call performance — closed cases</div>
  <div class="kpi-grid" id="kpiPerformance"></div>

  <hr class="divider">

  <div class="section-label">Territory breakdown</div>
  <div class="tab-container">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('status',this)">By Status</button>
      <button class="tab-btn" onclick="switchTab('worktype',this)">By Work Type</button>
      <button class="tab-btn" onclick="switchTab('overage',this)">Over 72 Hours</button>
    </div>
    <div id="tab-status" class="tab-panel active"></div>
    <div id="tab-worktype" class="tab-panel"></div>
    <div id="tab-overage" class="tab-panel"></div>
  </div>
</main>

<footer id="footer"></footer>

    mar: { count: 99,  avgDays: 6.40, ftf: 78  },

const terrName = id => DATA.territories[id] || id;
const wtName   = id => DATA.workTypes[id]   || id;
const isNull   = id => id === "null";
const pct      = (n, d) => d ? Math.round(n / d * 100) + "%" : "—";
const fmt1     = n => n.toFixed(1);

const totalOpen    = DATA.openByTerritory.reduce((s,t) => s+t.count, 0);
const totalOver72  = DATA.over72ByTerritory.reduce((s,t) => s+t.count, 0);
const escalated    = DATA.byStatus.find(r => r[1] === "Escalated");
const escalatedTerr = escalated ? terrName(escalated[0]) : "None";
const escalatedN   = escalated ? escalated[2] : 0;

function badgeClass(status) {
  if (status === "New") return "b-New";
  if (status === "Work Order Issued") return "b-WOI";
  if (status === "Processing Invoice") return "b-Invoice";
  if (status === "Escalated" || status === "Stop Credit") return "b-Escalated";
  return "b-Waiting";
}

function kpiCard(cls, label, value, valueCls, sub, trend, trendCls, bar) {
  return `<div class="kpi-card ${cls}">
    <div class="kpi-label">${label}</div>
    <div class="kpi-value ${valueCls}">${value}</div>
    <div class="kpi-sub">${sub}</div>
    ${trend ? `<div class="kpi-trend ${trendCls}">${trend}</div>` : ""}
    ${bar !== undefined ? `<div class="progress-bar"><div class="progress-fill ${bar.cls}" style="width:${bar.w}%"></div></div>` : ""}
  </div>`;
}

document.getElementById("kpiSnapshot").innerHTML = [
  kpiCard("accent","Total open cases", totalOpen, "", "Across 5 territories", "", ""),
  kpiCard("alert", "Open &gt;72 hours", totalOver72, "alert", `${Math.round(totalOver72/totalOpen*100)}% of all open cases`, "", ""),
  kpiCard("",      "Highest load", "NZ", "muted", `37 open · 36 over 72h`, "", ""),
  kpiCard("alert", "Escalated", escalatedN, escalatedN ? "alert" : "", escalatedTerr, "", "")
].join("");

const { mar, feb } = DATA.performance;
const marFTFpct  = mar.ftf  / mar.count  * 100;
const febFTFpct  = feb.ftf  / feb.count  * 100;
const daysDelta  = (mar.avgDays - feb.avgDays).toFixed(1);
const ftfDelta   = (marFTFpct - febFTFpct).toFixed(1);

document.getElementById("kpiPerformance").innerHTML = [
  kpiCard("good",  "Avg days to close — Mar MTD", fmt1(mar.avgDays), "good",  `${mar.count} closed service calls`, `▼ ${Math.abs(daysDelta)} days vs Feb`, "trend-good"),
  kpiCard("",      "Avg days to close — Feb",      fmt1(feb.avgDays), "muted", `${feb.count} closed service calls`, "", ""),
  kpiCard("good",  "First time fix — Mar MTD",     fmt1(marFTFpct)+"%", "good", `${mar.ftf} of ${mar.count} cases`, `▲ ${Math.abs(ftfDelta)}pp vs Feb`, "trend-good", {cls:"fill-green", w:marFTFpct}),
  kpiCard("",      "First time fix — Feb",          fmt1(febFTFpct)+"%", "muted", `${feb.ftf} of ${feb.count} cases`, "", "", {cls:"fill-muted", w:febFTFpct})
].join("");

function buildTerritoryTable(headers, rowsFn) {
  const terrOrder = DATA.openByTerritory.map(t => t.id);
  let rows = "";
  for (const tid of terrOrder) {
    const total = DATA.openByTerritory.find(t => t.id === tid).count;
    const name  = isNull(tid)
      ? `<span style="font-style:italic;font-weight:400;color:var(--muted)">No territory assigned</span>`
      : terrName(tid);
    rows += `<tr class="tr-territory"><td>${name}<span class="terr-count">${total} total</span></td>${"<td></td>".repeat(headers.length - 1)}</tr>`;
    rows += rowsFn(tid, total);
  }
  const ths = headers.map((h,i) => `<th${i>0?' class="right"':''}>${h}</th>`).join("");
  return `<table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
}

document.getElementById("tab-status").innerHTML = buildTerritoryTable(
  ["Territory / Status", "Cases", "Share", ""],
  (tid, total) => {
    const rows = DATA.byStatus.filter(r => r[0] === tid);
    const max  = Math.max(...rows.map(r => r[2]));
    return rows.map(([,status,count]) => `
      <tr>
        <td class="indent"><span class="badge ${badgeClass(status)}">${status}</span></td>
        <td class="count">${count}</td>
        <td class="pct">${pct(count, total)}</td>
        <td><div class="bar-bg"><div class="bar-fill" style="width:${Math.round(count/max*100)}%"></div></div></td>
      </tr>`).join("");
  }
);

document.getElementById("tab-worktype").innerHTML = buildTerritoryTable(
  ["Territory / Work Type", "Cases", "Share", ""],
  (tid, total) => {
    const rows = DATA.byWorkType.filter(r => r[0] === tid);
    const max  = Math.max(...rows.map(r => r[2]));
    return rows.map(([,wtId,count]) => {
      const isNullWt = wtId === "null";
      const label = isNullWt
        ? `<span style="color:var(--muted);font-style:italic">${wtName(wtId)}</span>`
        : wtName(wtId);
      return `
        <tr>
          <td class="indent">${label}</td>
          <td class="count" ${isNullWt?'style="color:var(--muted)"':''}>${count}</td>
          <td class="pct">${pct(count, total)}</td>
          <td><div class="bar-bg"><div class="bar-fill${isNullWt?' muted':''}" style="width:${Math.round(count/max*100)}%"></div></div></td>
        </tr>`;
    }).join("");
  }
);

const terrOrder72 = [...DATA.over72ByTerritory].sort((a,b) => b.count - a.count);
const cells = terrOrder72.map(({ id, count }) => {
  const total = (DATA.openByTerritory.find(t => t.id === id) || {count:0}).count;
  const p = total ? Math.round(count / total * 100) : 0;
  const name = isNull(id)
    ? `<span style="font-style:italic">${terrName(id)}</span>`
    : terrName(id);
  return `<div class="overage-cell">
    <div class="overage-name">${name}</div>
    <div class="overage-nums"><span class="overage-big">${count}</span><span class="overage-of">/ ${total}</span></div>
    <div class="overage-pct">${p}% of territory</div>
    <div class="overage-bar-bg"><div class="overage-bar-fill" style="width:${p}%"></div></div>
  </div>`;
}).join("");

document.getElementById("tab-overage").innerHTML = `
  <div class="overage-grid">${cells}</div>
  <div class="overage-total-row">
    <span class="overage-total-label">Total open &gt;72 hours</span>
    <span class="overage-total-val">${totalOver72} of ${totalOpen} &nbsp;·&nbsp; ${pct(totalOver72, totalOpen)}</span>
  </div>`;

document.getElementById("asOf").textContent = DATA.asOf;
document.getElementById("footer").textContent =
  `Ricoh South Pacific · Data from Salesforce · ${DATA.asOf}`;

function switchTab(name, btn) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.getElementById("tab-" + name).classList.add("active");
  btn.classList.add("active");
}
</script>
</body>
</html>
