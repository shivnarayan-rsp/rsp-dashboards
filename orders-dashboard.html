<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSP Operations Dashboard</title>
<style>
  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --surface-2: #f1efe8;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.2);
    --text: #2c2c2a;
    --text-muted: #888780;
    --text-hint: #b4b2a9;
    --accent: #1d9e75;
    --accent-bg: #e1f5ee;
    --accent-text: #085041;
    --warn: #ba7517;
    --warn-bg: #faeeda;
    --warn-text: #633806;
    --danger: #a32d2d;
    --danger-bg: #fcebeb;
    --danger-text: #501313;
    --info-bg: #e6f1fb;
    --info-text: #042c53;
    --placed-bg: #eeedfe;
    --placed-text: #26215c;
    --radius: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18; --surface: #252522; --surface-2: #2c2c2a;
      --border: rgba(255,255,255,0.1); --border-strong: rgba(255,255,255,0.2);
      --text: #f1efe8; --text-muted: #888780; --text-hint: #5f5e5a;
      --accent: #5dcaa5; --accent-bg: #04342c; --accent-text: #9fe1cb;
      --warn: #ef9f27; --warn-bg: #412402; --warn-text: #fac775;
      --danger: #f09595; --danger-bg: #501313; --danger-text: #f7c1c1;
      --info-bg: #042c53; --info-text: #b5d4f4;
      --placed-bg: #26215c; --placed-text: #cecbf6;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; min-height: 100vh; }
  .header { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; position: sticky; top: 0; z-index: 100; }
  .hrow { display: flex; align-items: center; gap: 12px; }
  .logo { width: 30px; height: 30px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .h1 { font-size: 15px; font-weight: 500; }
  .h-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .btn-r { display: flex; align-items: center; gap: 6px; padding: 6px 12px; background: var(--surface); border: 0.5px solid var(--border-strong); border-radius: var(--radius); font-size: 13px; color: var(--text); cursor: pointer; text-decoration: none; transition: background 0.15s; }
  .btn-r:hover { background: var(--surface-2); }
  .ts { font-size: 12px; color: var(--text-muted); }
  .controls { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 10px 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .fl { font-size: 11px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
  .fg { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .chip { padding: 4px 10px; border-radius: 100px; border: 0.5px solid var(--border-strong); background: var(--surface); font-size: 12px; color: var(--text-muted); cursor: pointer; transition: all 0.12s; user-select: none; white-space: nowrap; }
  .chip:hover { border-color: var(--accent); color: var(--text); }
  .chip.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent-text); font-weight: 500; }
  .div { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
  .main { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }
  .slabel { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 10px; }
  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 24px; }
  .tile { background: var(--surface-2); border-radius: var(--radius); padding: 14px 16px; cursor: pointer; transition: all 0.12s; border: 1.5px solid transparent; }
  .tile:hover { border-color: var(--border-strong); }
  .tile-lbl { font-size: 11px; color: var(--text-muted); font-weight: 500; margin-bottom: 6px; }
  .tile-n { font-size: 28px; font-weight: 500; color: var(--text); line-height: 1; }
  .tile-s { font-size: 11px; color: var(--text-hint); margin-top: 4px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle; }
  .sh { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .badge { font-size: 12px; color: var(--text-muted); background: var(--surface-2); padding: 2px 8px; border-radius: 100px; border: 0.5px solid var(--border); }
  .srow { display: flex; gap: 12px; flex-wrap: wrap; }
  .ss { font-size: 12px; color: var(--text-muted); }
  .ss strong { color: var(--text); font-weight: 500; }
  .tw { background: var(--surface); border-radius: var(--radius-lg); border: 0.5px solid var(--border); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  th { text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; background: var(--surface-2); border-bottom: 0.5px solid var(--border); cursor: pointer; white-space: nowrap; user-select: none; }
  th:hover { color: var(--text); }
  th .sa { display: inline-block; margin-left: 4px; opacity: 0.4; }
  th.sorted .sa { opacity: 1; color: var(--accent); }
  td { padding: 10px 14px; border-bottom: 0.5px solid var(--border); vertical-align: middle; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface-2); }
  .sb { display: inline-block; padding: 2px 8px; border-radius: 100px; font-size: 11px; font-weight: 500; }
  .s-Backordered { background: var(--danger-bg); color: var(--danger-text); }
  .s-Parked { background: var(--warn-bg); color: var(--warn-text); }
  .s-Placed { background: var(--placed-bg); color: var(--placed-text); }
  .ab { display: inline-block; padding: 2px 7px; border-radius: 100px; font-size: 11px; font-weight: 500; }
  .a-c { background: var(--danger-bg); color: var(--danger-text); }
  .a-w { background: var(--warn-bg); color: var(--warn-text); }
  .a-o { background: var(--accent-bg); color: var(--accent-text); }
  .a-n { background: var(--surface-2); color: var(--text-muted); }
  .etag { font-size: 11px; color: var(--info-text); background: var(--info-bg); padding: 2px 7px; border-radius: 4px; display: inline-block; }
  .empty { padding: 40px; text-align: center; color: var(--text-muted); }
  .co { width: 13%; } .ce { width: 10%; } .cc { width: 27%; } .cd { width: 9%; } .cr { width: 9%; } .ca { width: 8%; } .cv { width: 12%; } .cs { width: 12%; }
  @media (max-width: 768px) { .header,.controls { padding: 12px 16px; } .main { padding: 14px; } .cd,.cr { display: none; } }
</style>
</head>

  </div>
</div>

const ENT=[...new Set(D.map(d=>d.e))];
const STS=['Backordered','Parked','Placed'];
let AE=new Set(), AS=new Set(), SF='age', SD='desc';

document.getElementById('ts').textContent='Data as of 17 Mar 2026, 09:14 NZT';

function buildFilters(){
  const ef=document.getElementById('ef'), sf=document.getElementById('sf');
  const ae=mkChip('All',()=>{AE.clear();syncE();render();},true);
  ae.classList.add('active','ea'); ef.appendChild(ae);
  ENT.forEach(e=>{
    const c=mkChip(e,()=>{document.querySelector('.ea').classList.remove('active');AE.has(e)?AE.delete(e):AE.add(e);c.classList.toggle('active');if(!AE.size)document.querySelector('.ea').classList.add('active');render();});
    ef.appendChild(c);
  });
  const as=mkChip('All',()=>{AS.clear();syncS();render();},true);
  as.classList.add('active','sa2'); sf.appendChild(as);
  STS.forEach(s=>{
    const c=mkChip(s,()=>{document.querySelector('.sa2').classList.remove('active');AS.has(s)?AS.delete(s):AS.add(s);c.classList.toggle('active');if(!AS.size)document.querySelector('.sa2').classList.add('active');render();});
    sf.appendChild(c);
  });
}

function syncE(){document.querySelectorAll('#ef .chip:not(.ea)').forEach(c=>c.classList.remove('active'));document.querySelector('.ea').classList.add('active');}
function syncS(){document.querySelectorAll('#sf .chip:not(.sa2)').forEach(c=>c.classList.remove('active'));document.querySelector('.sa2').classList.add('active');}
function mkChip(l,fn,b){const el=document.createElement('div');el.className='chip';el.textContent=l;if(b)el.style.fontWeight='500';el.addEventListener('click',fn);return el;}

function fil(){return D.filter(d=>(!AE.size||AE.has(d.e))&&(!AS.size||AS.has(d.s)));}

function srt(data){return[...data].sort((a,b)=>{
  let va,vb;
  if(SF==='order'){va=a.o;vb=b.o;}else if(SF==='entity'){va=a.e;vb=b.e;}else if(SF==='customer'){va=a.c;vb=b.c;}else if(SF==='date'){va=a.od;vb=b.od;}else if(SF==='req'){va=a.rd;vb=b.rd;}else if(SF==='age'){va=a.a;vb=b.a;}else if(SF==='val'){va=a.v;vb=b.v;}else if(SF==='status'){va=a.s;vb=b.s;}
  if(typeof va==='string')return SD==='asc'?va.localeCompare(vb):vb.localeCompare(va);
  return SD==='asc'?va-vb:vb-va;
});}

function sb2(f){if(SF===f)SD=SD==='asc'?'desc':'asc';else{SF=f;SD=(f==='age'||f==='val')?'desc':'asc';}render();}

function fd(s){if(!s)return'—';const d=new Date(s);return d.toLocaleDateString('en-NZ',{day:'2-digit',month:'short'});}

function fv(v){
  if(!v)return'<span style="color:var(--text-hint)">—</span>';
  if(v>=1000000)return'NZD '+(v/1000000).toFixed(1)+'M';
  if(v>=1000)return'NZD '+(v/1000).toFixed(0)+'K';
  return'NZD '+v.toFixed(0);
}

function ab(d){
  if(d===0)return'<span class="ab a-n">Today</span>';
  if(d>=60)return`<span class="ab a-c">${d}d</span>`;
  if(d>=30)return`<span class="ab a-w">${d}d</span>`;
  if(d>=7) return`<span class="ab a-o">${d}d</span>`;
  return`<span class="ab a-n">${d}d</span>`;
}

function render(){
  const data=fil();
  const cnts={};STS.forEach(s=>cnts[s]=0);data.forEach(d=>{if(cnts[d.s]!==undefined)cnts[d.s]++;});
  const tv=data.reduce((s,d)=>s+d.v,0);
  const bv=data.filter(d=>d.s==='Backordered').reduce((s,d)=>s+d.v,0);
  const a30=data.filter(d=>d.a>=30).length;

  document.getElementById('tiles').innerHTML=`
    <div class="tile"><div class="tile-lbl">Total open orders</div><div class="tile-n">${data.length}</div><div class="tile-s">${fv(tv)} total value</div></div>
    <div class="tile" onclick="qf('Backordered')"><div class="tile-lbl"><span class="dot" style="background:#e24b4a"></span>Backordered</div><div class="tile-n">${cnts['Backordered']}</div><div class="tile-s">${fv(bv)}</div></div>
    <div class="tile" onclick="qf('Parked')"><div class="tile-lbl"><span class="dot" style="background:#ba7517"></span>Parked</div><div class="tile-n">${cnts['Parked']}</div><div class="tile-s">${cnts['Parked']} orders</div></div>
    <div class="tile" onclick="qf('Placed')"><div class="tile-lbl"><span class="dot" style="background:#534ab7"></span>Placed</div><div class="tile-n">${cnts['Placed']}</div><div class="tile-s">${cnts['Placed']} orders</div></div>
    <div class="tile"><div class="tile-lbl">Aged 30+ days</div><div class="tile-n" style="color:var(--danger)">${a30}</div><div class="tile-s">Needs immediate action</div></div>
  `;

  const rows=srt(data);
  document.getElementById('cnt').textContent=rows.length+' order'+(rows.length!==1?'s':'');
  const rtv=rows.reduce((s,d)=>s+d.v,0);
  const rbo=rows.filter(d=>d.s==='Backordered').length;
  const ra=rows.filter(d=>d.a>=30).length;
  document.getElementById('srow').innerHTML=`
    <span class="ss">Total value: <strong>${fv(rtv)}</strong></span>
    <span style="color:var(--text-hint);margin:0 6px;">·</span>
    <span class="ss">Backordered: <strong>${rbo}</strong></span>
    <span style="color:var(--text-hint);margin:0 6px;">·</span>
    <span class="ss">Aged 30+ days: <strong style="color:var(--danger)">${ra}</strong></span>
  `;

  const flds=['order','entity','customer','date','req','age','val','status'];
  document.querySelectorAll('th').forEach((th,i)=>{
    const sa=th.querySelector('.sa');if(!sa)return;
    th.classList.toggle('sorted',flds[i]===SF);
    sa.textContent=flds[i]===SF?(SD==='asc'?'↑':'↓'):'↕';
  });

  const emp=document.getElementById('emp');
  const tb=document.getElementById('tb');
  if(!rows.length){tb.innerHTML='';emp.style.display='block';return;}
  emp.style.display='none';
  tb.innerHTML=rows.map(d=>`
    <tr>
      <td style="font-family:monospace;font-size:11px;color:var(--text-muted)">${d.o}</td>
      <td><span class="etag">${d.e}</span></td>
      <td style="font-weight:500">${d.c}</td>
      <td style="color:var(--text-muted)">${fd(d.od)}</td>
      <td style="color:var(--text-muted)">${fd(d.rd)}</td>
      <td>${ab(d.a)}</td>
      <td style="font-size:12px">${fv(d.v)}</td>
      <td><span class="sb s-${d.s}">${d.s}</span></td>
    </tr>
  `).join('');
}

function qf(s){AS.clear();AS.add(s);syncS();document.querySelectorAll('#sf .chip:not(.sa2)').forEach(c=>{if(c.textContent===s)c.classList.add('active');});render();}

buildFilters();
render();
</script>
